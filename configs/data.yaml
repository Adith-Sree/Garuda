# Project Garuda - Dataset Configuration
# Supports VisDrone and custom UAV datasets

# --- Dataset Paths ---
# Update these paths to match your dataset location
train: ./datasets/VisDrone/train/images
val: ./datasets/VisDrone/val/images
test: ./datasets/VisDrone/test/images

# --- VisDrone Classes ---
# Standard VisDrone2019-DET dataset classes
nc: 10
names:
  0: pedestrian
  1: people
  2: bicycle
  3: car
  4: van
  5: truck
  6: tricycle
  7: awning-tricycle
  8: bus
  9: motor

# --- Custom Dataset Support ---
# To use a custom dataset, override the paths and classes above.
# Ensure images and labels follow the YOLO format:
#   datasets/
#   ├── custom/
#   │   ├── train/
#   │   │   ├── images/
#   │   │   └── labels/
#   │   ├── val/
#   │   │   ├── images/
#   │   │   └── labels/
#   │   └── test/
#   │       ├── images/
#   │       └── labels/

# --- Augmentation ---
augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.5
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.1
